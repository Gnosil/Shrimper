version: "3.9"
# Dev override: mount source, enable hot-reload, no replicas
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  channel-server:
    image: node:20-alpine
    working_dir: /app
    command: pnpm --filter @openclaw/channel-server dev
    volumes: [.:/app, /app/node_modules]
    environment:
      REDIS_URL: redis://redis:6379
    depends_on: [redis]
    ports: ["3000:3000"]

  worker:
    image: node:20-alpine
    working_dir: /app
    command: pnpm --filter @openclaw/worker-pool dev
    volumes: [.:/app, /app/node_modules, nas_data:/data/openclaw/users]
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: "2"
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY}
      # Optional COS config
      # COS_SECRET_ID: ${COS_SECRET_ID}
      # COS_SECRET_KEY: ${COS_SECRET_KEY}
      # COS_BUCKET: ${COS_BUCKET}
      # COS_REGION: ${COS_REGION}
    depends_on: [redis]

  baoshu-agent:
    image: node:20-alpine
    working_dir: /app
    command: pnpm --filter @openclaw/baoshu-agent dev
    volumes: [.:/app, /app/node_modules]
    environment:
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      # Optional WeChat Payment (leave empty for mock mode)
      # WECHAT_MCH_ID: ${WECHAT_MCH_ID}
      # WECHAT_MCH_KEY: ${WECHAT_MCH_KEY}
      # WECHAT_NOTIFY_URL: http://localhost:3001/webhook/wechat
    depends_on: [redis]
    ports: ["3001:3001"]

volumes:
  nas_data: